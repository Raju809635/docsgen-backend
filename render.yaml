services:
  - type: web
    name: docsgen-backend
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_USE_JSON_SCHEMA
        value: "0"
      - key: FRONTEND_ORIGIN
        sync: false
