services:
  - type: web
    name: docsgen-backend
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: OPENAI_BASE_URL
        value: ""
      - key: OPENAI_USE_JSON_SCHEMA
        value: "1"
      - key: FRONTEND_ORIGIN
        sync: false
